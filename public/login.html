<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - FinAI</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div id="finai-app">
    <video autoplay muted loop class="bg-video">
      <source src="assets\videos\vecteezy_president-benjamin-franklin-on-a-one-hundred-dollar-bill_1794370.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>
    
    <header class="finai-header">
      <div class="finai-logo">FinAI</div>
      <nav class="finai-auth-links">
        <a href="/index.html" class="finai-nav-link">Home</a>
        <a href="/signup.html" class="finai-btn-outline">Sign Up</a>
      </nav>
    </header>

    <section class="finai-auth-section">
      <div class="finai-auth-container">
        <h2 class="finai-auth-title">Welcome Back</h2>
        <p class="finai-auth-subtitle">Log in to manage your accounts and explore insights.</p>
        <form class="finai-login-form">
          <div class="finai-form-group">
            <label for="email" class="finai-label">Email Address</label>
            <input type="email" id="email" class="finai-input" placeholder="Enter your email" required>
          </div>
          <div class="finai-form-group">
            <label for="password" class="finai-label">Password</label>
            <input type="password" id="password" class="finai-input" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="finai-btn finai-btn-primary">Log In</button>
          <p class="finai-auth-switch">Don't have an account? <a href="/signup.html" class="finai-link">Sign Up</a></p>
        </form>
      </div>
    </section>

    <footer class="finai-footer">
      <p>© 2025 FinAI. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
  </div>
</body>
</html>
